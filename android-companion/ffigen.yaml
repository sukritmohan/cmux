# ffigen configuration for GhosttyKit VT terminal C API.
#
# Generate bindings:
#   cd android-companion && dart run ffigen
#
# Output: lib/native/ghostty_vt_bindings.dart

name: GhosttyVtBindings
description: FFI bindings for libghostty-vt terminal C API.
output: 'lib/native/ghostty_vt_bindings.dart'

headers:
  entry-points:
    - '../ghostty/include/ghostty/vt/terminal.h'
  include-directives:
    - '../ghostty/include/ghostty/vt/terminal.h'
    - '../ghostty/include/ghostty/vt/result.h'
    - '../ghostty/include/ghostty/vt/allocator.h'

compiler-opts:
  - '-I../ghostty/include'

preamble: |
  // AUTO-GENERATED by ffigen — do not edit.
  // Source: ghostty/include/ghostty/vt/terminal.h

type-map:
  typedefs:
    'GhosttyTerminal':
      lib: 'ffi'
      dart-type: 'Pointer<Void>'
      native-type: 'Pointer<Void>'
