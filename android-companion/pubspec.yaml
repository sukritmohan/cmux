name: cmux_companion
description: "cmux Android companion — view and interact with Mac terminal sessions."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Networking
  web_socket_channel: ^3.0.2

  # QR code scanning
  mobile_scanner: ^6.0.5

  # Secure credential storage
  flutter_secure_storage: ^9.2.4

  # Clipboard history persistence
  shared_preferences: ^2.3.4

  # Routing
  go_router: ^14.8.1

  # FFI
  ffi: ^2.1.4

  # Google Fonts (IBM Plex Sans, IBM Plex Mono)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # FFI code generation
  ffigen: ^20.1.1

  # Immutable data classes
  freezed: ^3.0.6
  json_serializable: ^6.9.5
  build_runner: ^2.4.15
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true

  fonts:
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/JetBrainsMono-Italic.ttf
          style: italic
        - asset: assets/fonts/JetBrainsMono-BoldItalic.ttf
          weight: 700
          style: italic
